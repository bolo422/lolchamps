<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campeões do League of Legends</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0a0a2e;
      color: #c8aa6e;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: linear-gradient(180deg, #1a1a4e 0%, #0a0a2e 100%);
    }

    header h1 {
      font-size: 2.5rem;
      color: #c8aa6e;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(200, 170, 110, 0.3);
    }

    header p {
      margin-top: 10px;
      font-size: 1rem;
      color: #8c7a4e;
    }

    #search-container {
      text-align: center;
      padding: 20px;
    }

    #search {
      width: 100%;
      max-width: 400px;
      padding: 12px 20px;
      border: 2px solid #c8aa6e;
      border-radius: 8px;
      background-color: #1a1a4e;
      color: #c8aa6e;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    #search::placeholder {
      color: #8c7a4e;
    }

    #search:focus {
      border-color: #f0e6d2;
      box-shadow: 0 0 10px rgba(200, 170, 110, 0.3);
    }

    #loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 1.2rem;
      color: #8c7a4e;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #1a1a4e;
      border-top: 4px solid #c8aa6e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #champions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      padding: 20px 40px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .champion-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(180deg, #1e1e50 0%, #12122e 100%);
      border: 1px solid #2a2a5a;
      border-radius: 10px;
      padding: 15px 10px;
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .champion-card:hover {
      transform: translateY(-5px);
      border-color: #c8aa6e;
      box-shadow: 0 8px 25px rgba(200, 170, 110, 0.15);
    }

    .champion-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #2a2a5a;
      transition: border-color 0.3s;
      object-fit: cover;
    }

    .champion-card:hover img {
      border-color: #c8aa6e;
    }

    .champion-card .name {
      margin-top: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      color: #f0e6d2;
      letter-spacing: 0.5px;
    }

    .champion-card .title {
      margin-top: 4px;
      font-size: 0.7rem;
      text-align: center;
      color: #8c7a4e;
      font-style: italic;
    }

    #error {
      text-align: center;
      padding: 60px 20px;
      color: #e74c3c;
      font-size: 1.1rem;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.5rem;
      }

      #champions-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 12px;
        padding: 15px 15px 40px;
      }

      .champion-card img {
        width: 75px;
        height: 75px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>League of Legends</h1>
    <p>Todos os Campeoes</p>
  </header>

  <div id="search-container">
    <input type="text" id="search" placeholder="Buscar campeao...">
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando campeoes...</p>
  </div>

  <div id="error" class="hidden"></div>

  <div id="champions-grid" class="hidden"></div>

  <script>
    const VERSIONS_URL = 'https://ddragon.leagueoflegends.com/api/versions.json';

    async function fetchChampions() {
      try {
        // 1. Buscar a versao mais recente
        const versionsRes = await fetch(VERSIONS_URL);
        const versions = await versionsRes.json();
        const latestVersion = versions[0];

        // 2. Buscar dados de todos os campeoes
        const championsUrl = `https://ddragon.leagueoflegends.com/cdn/${latestVersion}/data/pt_BR/champion.json`;
        const championsRes = await fetch(championsUrl);
        const championsData = await championsRes.json();

        // 3. Transformar em array e ordenar alfabeticamente
        const champions = Object.values(championsData.data);
        champions.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));

        // 4. Renderizar na pagina
        renderChampions(champions, latestVersion);

        // 5. Atualizar contagem
        document.querySelector('header p').textContent =
          `Todos os Campeoes (${champions.length}) — Patch ${latestVersion}`;

      } catch (err) {
        console.error(err);
        document.getElementById('loading').classList.add('hidden');
        const errorDiv = document.getElementById('error');
        errorDiv.classList.remove('hidden');
        errorDiv.textContent = 'Erro ao carregar os campeoes. Verifique sua conexao e tente novamente.';
      }
    }

    function renderChampions(champions, version) {
      const grid = document.getElementById('champions-grid');
      grid.innerHTML = '';

      champions.forEach(champ => {
        const imgUrl = `https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${champ.image.full}`;

        const card = document.createElement('div');
        card.className = 'champion-card';
        card.setAttribute('data-name', champ.name.toLowerCase());

        card.innerHTML = `
          <img src="${imgUrl}" alt="${champ.name}" loading="lazy">
          <span class="name">${champ.name}</span>
          <span class="title">${champ.title}</span>
        `;

        grid.appendChild(card);
      });

      document.getElementById('loading').classList.add('hidden');
      grid.classList.remove('hidden');
    }

    // Filtro de busca
    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      const cards = document.querySelectorAll('.champion-card');

      cards.forEach(card => {
        const name = card.getAttribute('data-name');
        card.style.display = name.includes(query) ? '' : 'none';
      });
    });

    // Iniciar
    fetchChampions();
  </script>

</body>
</html>

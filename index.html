<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campeões do League of Legends</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c8aa6e;
      --gold2:   #f0e6d2;
      --gold3:   #a08a50;
      --dark1:   #010a13;
      --dark2:   #0a1428;
      --dark3:   #1e2328;
      --dark4:   #2c3137;
      --tag-bg:  #1a2030;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--dark1);
      color: var(--gold);
      min-height: 100vh;
    }

    /* ─── HEADER ─────────────────────────────────── */
    header {
      position: relative;
      text-align: center;
      padding: 40px 20px 24px;
      background: linear-gradient(180deg, #0a1428 0%, var(--dark1) 100%);
      border-bottom: 1px solid #2a2a3a;
    }
    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(200,170,110,.4);
    }
    #subtitle {
      margin-top: 8px;
      font-size: .9rem;
      color: var(--gold3);
      letter-spacing: 1px;
    }

    /* ─── LANGUAGE SWITCHER ──────────────────────── */
    #lang-switcher {
      position: absolute;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .lang-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1.5px solid var(--dark4);
      background: var(--dark2);
      color: var(--gold3);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .5px;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
    }
    .lang-btn:hover { border-color: var(--gold3); color: var(--gold); }
    .lang-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: #1a2035;
    }

    /* ─── CONTROLS ───────────────────────────────── */
    #controls {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 0;
    }

    #search-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    #search {
      width: 100%;
      max-width: 440px;
      padding: 10px 18px;
      border: 1.5px solid var(--gold3);
      border-radius: 6px;
      background: var(--dark2);
      color: var(--gold2);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #search::placeholder { color: var(--gold3); }
    #search:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(200,170,110,.2); }

    /* filter grid */
    #filters {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold3); }
    .filter-group select {
      padding: 7px 10px;
      border: 1.5px solid var(--dark4);
      border-radius: 5px;
      background: var(--dark2);
      color: var(--gold);
      font-size: .85rem;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .filter-group select:focus { border-color: var(--gold3); }

    #filter-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    #count { font-size: .85rem; color: var(--gold3); }
    #reset-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--gold3);
      border-radius: 5px;
      background: transparent;
      color: var(--gold3);
      font-size: .8rem;
      cursor: pointer;
      letter-spacing: .5px;
      transition: border-color .2s, color .2s;
    }
    #reset-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ─── GRID ───────────────────────────────────── */
    #champions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 16px;
      padding: 20px 24px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .champion-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(170deg, #1a2035 0%, #0d1120 100%);
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 14px 10px 12px;
      cursor: default;
      transition: transform .2s, border-color .25s, box-shadow .25s;
      position: relative;
      overflow: hidden;
    }
    .champion-card:hover {
      transform: translateY(-5px);
      border-color: var(--gold3);
      box-shadow: 0 10px 30px rgba(200,170,110,.12);
    }
    .champion-card.hidden { display: none; }

    .champion-card img {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 2.5px solid #2a2a3a;
      object-fit: cover;
      transition: border-color .25s;
    }
    .champion-card:hover img { border-color: var(--gold3); }

    .champ-name {
      margin-top: 9px;
      font-size: .88rem;
      font-weight: 700;
      text-align: center;
      color: var(--gold2);
      letter-spacing: .3px;
    }
    .champ-title {
      margin-top: 3px;
      font-size: .68rem;
      text-align: center;
      color: var(--gold3);
      font-style: italic;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      margin-top: 8px;
    }
    .tag {
      font-size: .62rem;
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--tag-bg);
      border: 1px solid #2a3050;
      color: #8ab4d4;
      white-space: nowrap;
      text-transform: capitalize;
    }
    .tag.resource { color: #a0e0a0; border-color: #2a4a2a; }
    .tag.range    { color: #e0b080; border-color: #4a3a20; }
    .tag.year     { color: #b0a0d0; border-color: #3a2a50; }

    /* info rows below tags */
    .meta-rows {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-top: 8px;
      width: 100%;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .65rem;
      gap: 4px;
    }
    .meta-label { color: var(--gold3); white-space: nowrap; }
    .meta-value { color: var(--gold2); text-align: right; word-break: break-word; }

    /* ─── LOADING / ERROR ────────────────────────── */
    #loading {
      text-align: center;
      padding: 80px 20px;
      font-size: 1.1rem;
      color: var(--gold3);
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #1a2030;
      border-top: 3px solid var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      text-align: center;
      padding: 60px 20px;
      color: #e05050;
      font-size: 1rem;
    }
    .hidden { display: none !important; }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 520px) {
      #lang-switcher { top: 10px; right: 10px; }
      #filters { grid-template-columns: 1fr 1fr; }
      #champions-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 14px 12px 40px; }
      .champion-card img { width: 70px; height: 70px; }
    }
  </style>
</head>
<body>

<header>
  <div id="lang-switcher">
    <button class="lang-btn active" data-lang="pt-BR">PT</button>
    <button class="lang-btn"        data-lang="en-US">EN</button>
  </div>
  <h1>League of Legends</h1>
  <p id="subtitle"></p>
</header>

<div id="controls">
  <div id="search-wrap">
    <input type="text" id="search">
  </div>

  <div id="filters">
    <div class="filter-group">
      <label data-i18n="label.class"></label>
      <select id="f-class"></select>
    </div>
    <div class="filter-group">
      <label data-i18n="label.resource"></label>
      <select id="f-resource"></select>
    </div>
    <div class="filter-group">
      <label data-i18n="label.range"></label>
      <select id="f-range">
        <option value="" data-i18n="filter.all-f"></option>
        <option value="Melee">Melee</option>
        <option value="Ranged">Ranged</option>
      </select>
    </div>
    <div class="filter-group">
      <label data-i18n="label.gender"></label>
      <select id="f-gender"></select>
    </div>
    <div class="filter-group">
      <label data-i18n="label.species"></label>
      <select id="f-species"></select>
    </div>
    <div class="filter-group">
      <label data-i18n="label.region"></label>
      <select id="f-region"></select>
    </div>
    <div class="filter-group">
      <label data-i18n="label.year"></label>
      <select id="f-year"></select>
    </div>
  </div>

  <div id="filter-actions">
    <span id="count"></span>
    <button id="reset-btn" data-i18n="btn.reset"></button>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p data-i18n="msg.loading"></p>
</div>

<div id="error" class="hidden"></div>
<div id="champions-grid" class="hidden"></div>

<script>
  // ─── i18n strings ─────────────────────────────────────────
  const STRINGS = {
    'pt-BR': {
      'page.title':        'Campeões do League of Legends',
      'subtitle':          (n, p) => `${n} campeões — Patch ${p}`,
      'msg.loading':       'Carregando campeões...',
      'msg.error':         'Erro ao carregar os dados. Verifique sua conexão e recarregue a página.',
      'search.placeholder':'Buscar campeão...',
      'label.class':       'Classe',
      'label.resource':    'Recurso',
      'label.range':       'Alcance',
      'label.gender':      'Gênero',
      'label.species':     'Espécie',
      'label.region':      'Região',
      'label.year':        'Ano de lançamento',
      'filter.all-m':      'Todos',
      'filter.all-f':      'Todas',
      'btn.reset':         'Limpar filtros',
      'count':             (n) => `${n} campeão${n !== 1 ? 'ões' : ''} encontrado${n !== 1 ? 's' : ''}`,
      'card.gender':       'Gênero',
      'card.species':      'Espécie',
      'card.region':       'Região',
      // Resource labels
      'res.Mana':          'Mana',
      'res.Energy':        'Energia',
      'res.None':          'Nenhum',
      'res.Rage':          'Fúria',
      'res.Fury':          'Fúria',
      'res.Courage':       'Coragem',
      'res.Shield':        'Escudo',
      'res.Ferocity':      'Ferocidade',
      'res.Heat':          'Calor',
      'res.Grit':          'Tenacidade',
      'res.Flow':          'Fluxo',
      'res.Crimson Rush':  'Sede Carmesim',
      'res.Blood Well':    'Poço de Sangue',
      // Class labels
      'cls.fighter':       'Lutador',
      'cls.mage':          'Mago',
      'cls.assassin':      'Assassino',
      'cls.marksman':      'Atirador',
      'cls.support':       'Suporte',
      'cls.tank':          'Tank',
    },
    'en-US': {
      'page.title':        'League of Legends Champions',
      'subtitle':          (n, p) => `${n} champions — Patch ${p}`,
      'msg.loading':       'Loading champions...',
      'msg.error':         'Failed to load data. Check your connection and reload the page.',
      'search.placeholder':'Search champion...',
      'label.class':       'Class',
      'label.resource':    'Resource',
      'label.range':       'Range',
      'label.gender':      'Gender',
      'label.species':     'Species',
      'label.region':      'Region',
      'label.year':        'Release year',
      'filter.all-m':      'All',
      'filter.all-f':      'All',
      'btn.reset':         'Clear filters',
      'count':             (n) => `${n} champion${n !== 1 ? 's' : ''} found`,
      'card.gender':       'Gender',
      'card.species':      'Species',
      'card.region':       'Region',
      // Resource labels (no translation needed — kept as-is)
      'res.Mana':          'Mana',
      'res.Energy':        'Energy',
      'res.None':          'None',
      'res.Rage':          'Rage',
      'res.Fury':          'Fury',
      'res.Courage':       'Courage',
      'res.Shield':        'Shield',
      'res.Ferocity':      'Ferocity',
      'res.Heat':          'Heat',
      'res.Grit':          'Grit',
      'res.Flow':          'Flow',
      'res.Crimson Rush':  'Crimson Rush',
      'res.Blood Well':    'Blood Well',
      // Class labels
      'cls.fighter':       'Fighter',
      'cls.mage':          'Mage',
      'cls.assassin':      'Assassin',
      'cls.marksman':      'Marksman',
      'cls.support':       'Support',
      'cls.tank':          'Tank',
    },
  };

  // ─── Language state ───────────────────────────────────────
  let currentLang = 'pt-BR';

  function t(key, ...args) {
    const val = STRINGS[currentLang][key] ?? STRINGS['en-US'][key] ?? key;
    return typeof val === 'function' ? val(...args) : val;
  }

  function labelResource(raw) { return t(`res.${raw}`) || raw; }
  function labelClass(raw)    { return t(`cls.${raw.toLowerCase()}`) || raw; }

  // ─── Apply i18n to the static DOM ────────────────────────
  function applyStaticStrings() {
    document.documentElement.lang = currentLang;
    document.title = t('page.title');
    document.getElementById('search').placeholder = t('search.placeholder');

    // elements with data-i18n attribute
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      const str = t(key);
      if (typeof str === 'string') el.textContent = str;
    });

    // update lang-btn active state
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
  }

  // ─── Rebuild filter <select> labels after lang switch ────
  function rebuildFilterLabels() {
    // f-class: rebuild options with translated labels
    const fClass = document.getElementById('f-class');
    const prevClass = fClass.value;
    fClass.innerHTML = `<option value="">${t('filter.all-m')}</option>`;
    [...classSet].sort().forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = labelClass(v);
      fClass.appendChild(opt);
    });
    fClass.value = prevClass;

    // f-resource: rebuild options with translated labels
    const fRes = document.getElementById('f-resource');
    const prevRes = fRes.value;
    fRes.innerHTML = `<option value="">${t('filter.all-m')}</option>`;
    [...resourceSet].sort().forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = labelResource(v);
      fRes.appendChild(opt);
    });
    fRes.value = prevRes;

    // f-range "all" option text
    document.querySelector('#f-range option[value=""]').textContent = t('filter.all-f');

    // f-gender, f-species, f-region, f-year: "all" option only
    [
      ['f-gender',  'filter.all-m'],
      ['f-species', 'filter.all-f'],
      ['f-region',  'filter.all-f'],
      ['f-year',    'filter.all-m'],
    ].forEach(([id, key]) => {
      document.querySelector(`#${id} option[value=""]`).textContent = t(key);
    });
  }

  // ─── Update card labels after lang switch ────────────────
  function updateCardLabels() {
    document.querySelectorAll('.champion-card').forEach(card => {
      // class tags
      card.querySelectorAll('.tag[data-cls]').forEach(tag => {
        tag.textContent = labelClass(tag.dataset.cls);
      });
      // resource tag
      const resTag = card.querySelector('.tag.resource');
      if (resTag) resTag.textContent = labelResource(resTag.dataset.res);
      // meta-row labels
      card.querySelectorAll('.meta-label[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
    });

    // update count text
    const visible = document.querySelectorAll('.champion-card:not(.hidden)').length;
    document.getElementById('count').textContent = t('count', visible);
  }

  // ─── Estado global ────────────────────────────────────────
  let allChampions = [];
  let classSet    = new Set();
  let resourceSet = new Set();
  let currentPatch = '';

  // ─── Fetch ────────────────────────────────────────────────
  async function init() {
    applyStaticStrings();
    try {
      const [versionsRes, metaRes] = await Promise.all([
        fetch('https://ddragon.leagueoflegends.com/api/versions.json'),
        fetch('champions-meta.json'),
      ]);

      const versions = await versionsRes.json();
      const meta     = await metaRes.json();
      currentPatch   = versions[0];

      // Fetch champion names in pt-BR for display, and en-US for fallback
      const champRes = await fetch(
        `https://ddragon.leagueoflegends.com/cdn/${currentPatch}/data/pt_BR/champion.json`
      );
      const champData = await champRes.json();

      const rawChamps = Object.values(champData.data);
      rawChamps.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));

      allChampions = rawChamps.map(c => {
        const m = meta[c.id] || {};
        return {
          id:          c.id,
          name:        c.name,
          title:       c.title,
          imgUrl:      `https://ddragon.leagueoflegends.com/cdn/${currentPatch}/img/champion/${c.image.full}`,
          classes:     (c.tags || []).map(tag => tag.toLowerCase()),
          resource:    m.resource || c.partype || 'None',
          attackType:  m.attackType || 'Ranged',
          gender:      m.gender      || '—',
          species:     m.species     || '—',
          region:      m.region      || '—',
          releaseYear: m.releaseYear || '—',
        };
      });

      buildFilterOptions();
      renderAll();

      document.getElementById('subtitle').textContent =
        t('subtitle', allChampions.length, currentPatch);

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('champions-grid').classList.remove('hidden');

    } catch (err) {
      console.error(err);
      document.getElementById('loading').classList.add('hidden');
      const el = document.getElementById('error');
      el.classList.remove('hidden');
      el.textContent = t('msg.error');
    }
  }

  // ─── Popula os <select> dinamicamente ────────────────────
  function buildFilterOptions() {
    const genders = new Set();
    const species = new Set();
    const regions = new Set();
    const years   = new Set();

    allChampions.forEach(c => {
      c.classes.forEach(cl => classSet.add(cl));
      resourceSet.add(c.resource);
      if (c.gender      !== '—') genders.add(c.gender);
      if (c.species     !== '—') species.add(c.species);
      if (c.region      !== '—') regions.add(c.region);
      if (c.releaseYear !== '—') years.add(c.releaseYear);
    });

    // class (translated)
    populate('f-class', [...classSet].sort(), labelClass, t('filter.all-m'));
    // resource (translated)
    populate('f-resource', [...resourceSet].sort(), labelResource, t('filter.all-m'));
    // others (raw values, no translation)
    populate('f-gender',  [...genders].sort(), v => v, t('filter.all-m'));
    populate('f-species', [...species].sort(), v => v, t('filter.all-f'));
    populate('f-region',  [...regions].sort(), v => v, t('filter.all-f'));
    populate('f-year',    [...years].sort((a, b) => a - b), String, t('filter.all-m'));
  }

  function populate(id, values, labelFn, allLabel) {
    const sel = document.getElementById(id);
    sel.innerHTML = `<option value="">${allLabel}</option>`;
    values.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = labelFn(v);
      sel.appendChild(opt);
    });
  }

  // ─── Render cards ─────────────────────────────────────────
  function renderAll() {
    const grid = document.getElementById('champions-grid');
    grid.innerHTML = '';

    allChampions.forEach(c => {
      const card = document.createElement('div');
      card.className = 'champion-card';
      card.dataset.name      = c.name.toLowerCase();
      card.dataset.classes   = c.classes.join(',');
      card.dataset.resource  = c.resource;
      card.dataset.range     = c.attackType;   // "Melee" | "Ranged"
      card.dataset.gender    = c.gender;
      card.dataset.species   = c.species;
      card.dataset.region    = c.region;
      card.dataset.year      = c.releaseYear;

      const classTags = c.classes
        .map(cl => `<span class="tag" data-cls="${cl}">${labelClass(cl)}</span>`)
        .join('');

      card.innerHTML = `
        <img src="${c.imgUrl}" alt="${c.name}" loading="lazy">
        <div class="champ-name">${c.name}</div>
        <div class="champ-title">${c.title}</div>
        <div class="tags">
          ${classTags}
          <span class="tag resource" data-res="${c.resource}">${labelResource(c.resource)}</span>
          <span class="tag range">${c.attackType}</span>
          <span class="tag year">${c.releaseYear}</span>
        </div>
        <div class="meta-rows">
          <div class="meta-row">
            <span class="meta-label" data-i18n="card.gender">${t('card.gender')}</span>
            <span class="meta-value">${c.gender}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label" data-i18n="card.species">${t('card.species')}</span>
            <span class="meta-value">${c.species}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label" data-i18n="card.region">${t('card.region')}</span>
            <span class="meta-value">${c.region}</span>
          </div>
        </div>
      `;

      grid.appendChild(card);
    });

    applyFilters();
  }

  // ─── Filtragem ────────────────────────────────────────────
  function applyFilters() {
    const q        = document.getElementById('search').value.toLowerCase().trim();
    const fClass   = document.getElementById('f-class').value;
    const fRes     = document.getElementById('f-resource').value;
    const fRange   = document.getElementById('f-range').value;
    const fGender  = document.getElementById('f-gender').value;
    const fSpecies = document.getElementById('f-species').value;
    const fRegion  = document.getElementById('f-region').value;
    const fYear    = document.getElementById('f-year').value;

    let visible = 0;
    document.querySelectorAll('.champion-card').forEach(card => {
      const show =
        (!q        || card.dataset.name.includes(q)) &&
        (!fClass   || card.dataset.classes.split(',').includes(fClass)) &&
        (!fRes     || card.dataset.resource === fRes) &&
        (!fRange   || card.dataset.range    === fRange) &&
        (!fGender  || card.dataset.gender   === fGender) &&
        (!fSpecies || card.dataset.species  === fSpecies) &&
        (!fRegion  || card.dataset.region   === fRegion) &&
        (!fYear    || String(card.dataset.year) === fYear);

      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });

    document.getElementById('count').textContent = t('count', visible);
  }

  function resetFilters() {
    ['f-class','f-resource','f-range','f-gender','f-species','f-region','f-year']
      .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('search').value = '';
    applyFilters();
  }

  // ─── Language switch ──────────────────────────────────────
  function switchLang(lang) {
    if (lang === currentLang) return;
    currentLang = lang;

    applyStaticStrings();
    document.getElementById('subtitle').textContent =
      t('subtitle', allChampions.length, currentPatch);

    if (allChampions.length > 0) {
      rebuildFilterLabels();
      updateCardLabels();
    }
  }

  // ─── Event listeners ─────────────────────────────────────
  document.getElementById('search').addEventListener('input', applyFilters);
  ['f-class','f-resource','f-range','f-gender','f-species','f-region','f-year']
    .forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
  document.getElementById('reset-btn').addEventListener('click', resetFilters);

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => switchLang(btn.dataset.lang));
  });

  // ─── Start ───────────────────────────────────────────────
  init();
</script>
</body>
</html>
